name: FGH-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,10,18 * * *'
jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 拉取私库脚本
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/heyzone/freegamehost-auto.git private_repo
          cp private_repo/renew.py renew.py
      
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 下载 GOST（供 Python 按需启动多节点）
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          echo "✅ GOST 下载完成"

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
