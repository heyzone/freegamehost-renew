name: FGH-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: 🛡️ 启动 GOST 代理
        if: ${{ secrets.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf *.tar.gz
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" &

      - name: 安装依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 运行
        env:
          PTERO_SESSION: ${{ secrets.PTERO_SESSION }}
          PTERO_XSRF: ${{ secrets.PTERO_XSRF }}
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
          SERVER_IDS: ${{ secrets.SERVER_IDS }}
          TG_BOT: ${{ secrets.TG_BOT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          python renew.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: "*.png"
