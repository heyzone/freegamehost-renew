name: FGH-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # 👉 修复点1：不能在 if 里直接用 secrets
      - name: 🛡️ 启动 GOST 代理
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          echo "🚀 启动 GOST..."
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"

          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost

          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3

          echo "🔍 检测代理IP..."
          curl -x http://127.0.0.1:8080 https://api.ipify.org || echo "⚠️ 代理检测失败"

      - name: 🐍 安装依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行脚本
        env:
          PTERO_SESSION: ${{ secrets.PTERO_SESSION }}
          PTERO_XSRF: ${{ secrets.PTERO_XSRF }}
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
          SERVER_IDS: ${{ secrets.SERVER_IDS }}
          TG_BOT: ${{ secrets.TG_BOT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
